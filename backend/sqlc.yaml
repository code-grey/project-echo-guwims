version: "2"
sql:
  - schema: "sql/schema.sql"
    queries: "sql/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "postgres"
        out: "internal/adapters/repository/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: jsonb
            go_type: string
          - db_type: json
            go_type: string
